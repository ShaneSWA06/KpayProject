app = "kpayproject"
primary_region = "sin"

[env]
  HOST = "0.0.0.0"
  PORT = "4173"

[http_service]
  internal_port = 4173
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/api/health"
